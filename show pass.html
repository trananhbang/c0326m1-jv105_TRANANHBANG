<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>show pass</title>
</head>
<body>
    <div>
        <input id="userName" placeholder="Username" type="text"/>
    </div>
    <div>
        <input id="password" placeholder="Password" type="password"/>
        <button id="btn" onclick="tongleP" type="button">Show pass</button>
    </div>
    <script>

        function showPass() {
            let pass = document.getElementById("password");

            if (pass.type === "password") {
                pass.type = "text";
            } else {
                pass.type = "password";
            }
        }

    </script>
</body>
</html>
