<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sở thích</title>
    <style>
        .folder{
            color: blue;
        }
        .checkbox{
            color: orangered;
        }

        .form-box{
            width: 500px;
            margin: 20px auto;
            border: 20px solid deepskyblue;
            padding: 10px;
        }
        .button{
            text-align: center;
        }
    </style>
</head>
<body>
<form>
    <div class="form-box">
        <h2 style="background-color: orangered; color: white; text-align: center">SỞ THÍCH CỦA BẠN</h2>
        <div class="folder">
            <div>
                <label>Họ và tên</label>
                <input type="text" name="hovaten">
            </div>

            <div>
                <label>Email</label>
                <input type="text" name="email">
            </div>

            <label>Sở thích</label>
        </div>
        <div class="checkbox">
            <label><input type="checkbox" name="sở thích" value="Thể thao">Thể thao</label>
            <label><input type="checkbox" name="sở thích" value="Âm nhạc">Âm nhạc</label>
            <label><input type="checkbox" name="sở thích" value="Đọc sách">Đọc sách</label><br>
            <label><input type="checkbox" name="sở thích" value="Lướt web">Lướt web</label>
            <label><input type="checkbox" name="Sở thích" value="Chơi game">Chơi game</label>
            <label><input type="checkbox" name="Sở thích" value="Điện ảnh">Điện ảnh</label><br>
            <label><input type="checkbox" name="Sỏ thích" value="Du lịch">Du lịch</label>
        </div>
        <div class="button">
            <button type="submit">Gửi thông tin</button>
            <button type="reset">Nhập lại</button>
        </div>
    </div>


</form>
</body>
</html>
